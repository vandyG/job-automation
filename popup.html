<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .status {
            padding: 8px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin: 10px 0;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Automation</h3>

        <div style="display:flex; gap:8px;">
            <button id="tabListbox" style="flex:1;">Listbox</button>
            <button id="tabJob" style="flex:1;">Job Site</button>
        </div>

        <div id="listboxPanel">
            <label for="listboxData">Listbox Data (JSON):</label>
            <textarea id="listboxData" placeholder="Paste your JSON data here..."></textarea>
            <button id="automateBtn">Start Listbox Automation</button>
            <button id="detectBtn">Detect Listboxes</button>
        </div>

        <div id="jobPanel" style="display:none;">
            <p style="font-size:13px; margin:0;">Run the Job Site automation flow on the active tab.</p>
            <button id="runJobBtn">Run Job Automation</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
